<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Instagram Reel Reviewer</title>

<link href="https://fonts.googleapis.com/css2?family=Rethink+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{
background:black;
color:white;
font-family:'Rethink Sans',sans-serif;
max-width:900px;
margin:auto;
padding:40px 20px;
line-height:1.6;
}

h1{
font-size:36px;
margin-bottom:10px;
color:#F92672;
}

h2{
margin-top:0;
}

p{
opacity:0.85;
}

input{
background:#111;
border:1px solid #333;
padding:14px;
font-size:16px;
color:white;
border-radius:6px;
width:260px;
}

input:focus{
outline:none;
border-color:#F92672;
}

button{
background:#F92672;
border:none;
padding:14px 18px;
font-size:16px;
border-radius:6px;
cursor:pointer;
margin-left:8px;
font-weight:600;
}

button:hover{
opacity:0.9;
}

.card{
background:#0a0a0a;
border:1px solid #222;
padding:24px;
border-radius:12px;
margin-top:25px;
}

.score{
font-size:32px;
font-weight:700;
color:#F92672;
margin:10px 0 20px 0;
}

.reel{
border-top:1px solid #222;
padding-top:16px;
margin-top:16px;
}

ul{
padding-left:20px;
}

.muted{
color:#aaa;
}

.error{
color:#ff4b4b;
margin-top:10px;
}

</style>

</head>

<body>

<h1>Instagram Reel Reviewer</h1>

<p class="muted">
Enter a public Instagram username to analyse their recent reels.
</p>

<input id="username" value="harankiru" placeholder="@username">

<button id="reviewBtn">
Review Reels
</button>

<div id="status" class="muted" style="margin-top:12px"></div>

<div id="error" class="error"></div>

<div id="results"></div>

<script>

const btn = document.getElementById("reviewBtn")
const usernameInput = document.getElementById("username")
const statusEl = document.getElementById("status")
const errorEl = document.getElementById("error")
const resultsEl = document.getElementById("results")

function escapeHtml(str=""){
return str
.replaceAll("&","&amp;")
.replaceAll("<","&lt;")
.replaceAll(">","&gt;")
.replaceAll('"',"&quot;")
.replaceAll("'","&#039;")
}

btn.addEventListener("click", async ()=>{

const username = usernameInput.value.trim().replace("@","")

errorEl.textContent=""
resultsEl.innerHTML=""

if(!username){
errorEl.textContent="Please enter a username"
return
}

statusEl.textContent="Reviewing reels..."

try{

const res = await fetch("/api/review",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({username})
})

const data = await res.json()

if(!res.ok){
throw new Error(data.error || "Error fetching reels")
}

statusEl.textContent=""

resultsEl.innerHTML = `

<div class="card">

<h2>@${escapeHtml(data.username)}</h2>

<div class="score">
Overall Score: ${data.summary.score}/10
</div>

<p><strong>Verdict:</strong> ${escapeHtml(data.summary.verdict)}</p>

<h3 style="color:#F92672">Strengths</h3>
<ul>
${data.summary.strengths.map(i=>`<li>${escapeHtml(i)}</li>`).join("")}
</ul>

<h3 style="color:#F92672">Weaknesses</h3>
<ul>
${data.summary.weaknesses.map(i=>`<li>${escapeHtml(i)}</li>`).join("")}
</ul>

<h3 style="color:#F92672">Recommendations</h3>
<ul>
${data.summary.recommendations.map(i=>`<li>${escapeHtml(i)}</li>`).join("")}
</ul>

<h3 style="margin-top:30px;color:#F92672">Recent Reel Reviews</h3>

${data.reels.map(reel=>`

<div class="reel">

<p>
<strong>Caption:</strong><br>
${escapeHtml(reel.caption || "No caption found")}
</p>

<p class="muted">
Views: ${reel.views ?? "N/A"} |
Likes: ${reel.likes ?? "N/A"} |
Comments: ${reel.comments ?? "N/A"}
</p>

<p>
<strong>Score:</strong> ${reel.review.score}/10
</p>

<p>
${escapeHtml(reel.review.feedback)}
</p>

</div>

`).join("")}

</div>

`

}catch(err){

statusEl.textContent=""
errorEl.textContent = err.message

}

})

</script>

</body>
</html>
